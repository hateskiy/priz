<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #gift { font-size: 100px; cursor: pointer; transition: 0.2s; }
        #gift:active { transform: scale(0.9); }
        video { display: none; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="gift">🎁</div>

    <video id="scaryVideo">
        <source src="ssstik.io_@toxa.bambuk_1775387354585.mp4" type="video/mp4">
    </video>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        const gift = document.getElementById('gift');
        const video = document.getElementById('scaryVideo');

        gift.onclick = function() {
            gift.style.display = 'none'; // Убираем подарок
            video.style.display = 'block'; // Показываем видео
            video.play(); // Запускаем

            // Включаем вибрацию телефона (если это Android/iOS)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('error');
            }
        };
    </script>
</body>
</html>
