<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        #gift { text-align: center; cursor: pointer; }
        #gift-icon { font-size: 100px; display: block; margin-bottom: 20px; }
        video { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="gift" onclick="playScary()">
        <span id="gift-icon">🎁</span>
        <p>Нажми, чтобы открыть подарок!</p>
    </div>

    <video id="scaryVideo" playsinline>
        <source src="https://raw.githubusercontent.com/hateskiy/priz/main/ssstik.io_@toxa.bambuk_1775387354585%20(1).mp4" type="video/mp4">
    </video>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function playScary() {
            const video = document.getElementById('scaryVideo');
            const gift = document.getElementById('gift');
            gift.style.display = 'none';
            video.style.display = 'block';
            video.play().catch(e => console.log("Ошибка:", e));
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }
    </script>
</body>
</html>
